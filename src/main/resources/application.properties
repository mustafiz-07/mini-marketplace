spring.application.name=mini-marketplace
# ===========================
# PostgreSQL DataSource Config
# Values are required from env vars (see .env / docker-compose.yml).
# No in-file fallback credentials to avoid secret exposure.
# ===========================
spring.datasource.url=${DB_URL:${DATABASE_URL}}
spring.datasource.username=${DB_USERNAME:${DATABASE_USERNAME}}
spring.datasource.password=${DB_PASSWORD:${DATABASE_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate Config
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================
# Thymeleaf Config
# ===========================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ===========================
# Server Config
# ===========================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ===========================
# Logging (overridden by prod profile)
# ===========================
logging.level.org.springframework.web=DEBUG
logging.level.com.example.minimarketplace=DEBUG
