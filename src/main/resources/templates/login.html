<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login')}"></head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="page-wrap auth-page">
  <div class="form-card">

    <div class="form-card__header">
      <div class="form-card__logo">🌿 Mini<span>Market</span></div>
      <h2>Welcome back</h2>
      <p>Sign in to your account to continue</p>
    </div>

    <!-- Flash messages -->
    <div th:if="${loginError}" class="alert alert--error" data-dismiss>
      ⚠️ <span th:text="${loginError}">Invalid credentials.</span>
    </div>
    <div th:if="${logoutMsg}" class="alert alert--success" data-dismiss>
      ✅ <span th:text="${logoutMsg}">Logged out.</span>
    </div>
    <div th:if="${successMsg}" class="alert alert--success" data-dismiss>
      ✅ <span th:text="${successMsg}">Success.</span>
    </div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" name="email" type="email"
               placeholder="you@example.com" required autocomplete="email"/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               placeholder="••••••••" required autocomplete="current-password"/>
      </div>

      <button type="submit" class="btn btn--primary btn--full" style="margin-top:.75rem">
        Sign In →
      </button>
    </form>

    <div class="form-footer">
      Don't have an account? <a href="/register">Register here</a>
    </div>
  </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
