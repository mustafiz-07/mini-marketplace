<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Register')}"></head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="page-wrap auth-page">
  <div class="form-card" style="max-width:560px">

    <div class="form-card__header">
      <div class="form-card__logo">🌿 Mini<span>Market</span></div>
      <h2>Create an Account</h2>
      <p>Join as a buyer or start selling today</p>
    </div>

    <!-- Server-side error -->
    <div th:if="${errorMsg}" class="alert alert--error" data-dismiss>
      ⚠️ <span th:text="${errorMsg}"></span>
    </div>

    <form th:action="@{/register}" method="post" th:object="${userRequest}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label for="name">Full Name *</label>
        <input id="name" type="text" th:field="*{name}"
               placeholder="Jane Doe" required minlength="2"/>
        <span class="field-error"
              th:if="${#fields.hasErrors('name')}"
              th:errors="*{name}"></span>
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input id="email" type="email" th:field="*{email}"
               placeholder="jane@example.com" required/>
        <span class="field-error"
              th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}"></span>
      </div>

      <div class="form-group">
        <label for="password">Password *</label>
        <input id="password" type="password" th:field="*{password}"
               placeholder="Min. 6 characters" required minlength="6"/>
        <span class="field-error"
              th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}"></span>
      </div>

      <div class="form-group">
        <label for="role">I want to…</label>
        <select id="role" th:field="*{role}" required>
          <option value="">— Choose a role —</option>
          <option th:each="r : ${roles}"
                  th:value="${r}"
                  th:text="${r == T(com.example.minimarketplace.model.Role).BUYER
                              ? '🛒 Buy products'
                              : '🏪 Sell products'}">
          </option>
        </select>
        <span class="field-error"
              th:if="${#fields.hasErrors('role')}"
              th:errors="*{role}"></span>
      </div>

      <button type="submit" class="btn btn--green btn--full" style="margin-top:.75rem">
        Create Account →
      </button>
    </form>

    <div class="form-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
